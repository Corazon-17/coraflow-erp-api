version: "3"

dotenv: [".env"]

tasks:
  clean:ports:
    desc: Kill processes using service ports
    cmds:
      - lsof -ti :$API_GATEWAY_PORT,$TENANT_SERVICE_PORT,$USER_SERVICE_PORT,$HR_SERVICE_PORT | xargs kill -9 || true

  infra:
    desc: Start infrastructure (colima + docker)
    cmds:
      # - colima start
      - docker compose -f deployments/docker-compose.yml up -d

  infra:stop:
    desc: Stop infrastructure
    cmds:
      - docker compose -f deployments/docker-compose.yml down
      # - colima stop

  dev:
    desc: Run all services locally
    deps:
      - dev:gateway
      - dev:tenant
      - dev:user
      - dev:hr

  dev:gateway:
    desc: Run API Gateway
    dir: services/api-gateway
    cmds:
      - go run ./cmd/server

  dev:tenant:
    desc: Run Tenant Service
    dir: services/tenant-service
    cmds:
      - go run ./cmd/server

  dev:user:
    desc: Run User Service
    dir: services/user-service
    cmds:
      - go run ./cmd/server

  dev:hr:
    desc: Run HR Service
    dir: services/hr-service
    cmds:
      - go run ./cmd/server

  migrate:user:
  cmds:
    - migrate -path services/user-service/db/migrations -database "$USER_DB_URL" up

  migrate:tenant:
    cmds:
      - migrate -path services/tenant-service/db/migrations -database "$TENANT_DB_URL" up

  migrate:hr:
    cmds:
      - migrate -path services/hr-service/db/migrations -database "$HR_DB_URL" up

  proto:
    desc: Generate protobuf files
    cmds:
      - find proto -name "*.proto" -print0 | xargs -0 protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative

  sqlc:
    desc: Generate SQLC code
    cmds:
      - sqlc generate -f services/tenant-service/db/sqlc.yaml
      - sqlc generate -f services/user-service/db/sqlc.yaml
      - sqlc generate -f services/hr-service/db/sqlc.yaml

  tidy:
    desc: Go mod tidy all services
    cmds:
      - cd services/api-gateway && go mod tidy
      - cd services/tenant-service && go mod tidy
      - cd services/user-service && go mod tidy
      - cd services/hr-service && go mod tidy

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - go clean ./...
